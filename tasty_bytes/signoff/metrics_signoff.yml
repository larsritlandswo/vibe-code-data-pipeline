metrics:

  - name: total_revenue
    synonyms: [total sales, gross revenue, revenue, sales]
    definition: "Total revenue in USD. Primary revenue metric."
    formula: "SUM(TOTAL_REVENUE)"
    unit: USD
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [TOTAL_REVENUE]
    notes: "Revenue = SUM(order_detail.price) pre-aggregated per day/truck/location. Includes all order channels."
    approved_by: ""
    approved_date: ""

  - name: total_cogs
    synonyms: [cost of goods sold, cogs, cost]
    definition: "Total cost of goods sold in USD."
    formula: "SUM(TOTAL_COGS)"
    unit: USD
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [TOTAL_COGS]
    notes: "COGS = SUM(order_detail.quantity * menu.cost_of_goods_usd) pre-aggregated."
    approved_by: ""
    approved_date: ""

  - name: total_gross_profit
    synonyms: [gross profit, profit, margin dollars]
    definition: "Total gross profit in USD (revenue minus COGS)."
    formula: "SUM(TOTAL_GROSS_PROFIT)"
    unit: USD
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [TOTAL_GROSS_PROFIT]
    notes: "gross_profit = price - (quantity * cost_of_goods_usd) per line item, pre-aggregated."
    approved_by: ""
    approved_date: ""

  - name: total_orders
    synonyms: [number of orders, order count, orders]
    definition: "Total number of distinct orders."
    formula: "SUM(ORDER_COUNT)"
    unit: count
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [ORDER_COUNT]
    notes: "COUNT(DISTINCT order_id) pre-aggregated per day/truck/location."
    approved_by: ""
    approved_date: ""

  - name: total_items_sold
    synonyms: [quantity sold, units sold, items sold]
    definition: "Total quantity of menu items sold."
    formula: "SUM(ITEMS_SOLD)"
    unit: count
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [ITEMS_SOLD]
    notes: "SUM(quantity) from order detail lines, pre-aggregated."
    approved_by: ""
    approved_date: ""

  - name: total_unique_customers
    synonyms: [customer count, unique customers]
    definition: "Count of distinct customers. Excludes anonymous orders."
    formula: "SUM(UNIQUE_CUSTOMERS)"
    unit: count
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [UNIQUE_CUSTOMERS]
    notes: "COUNT(DISTINCT customer_id). NULLs excluded (anonymous orders)."
    approved_by: ""
    approved_date: ""

  - name: average_order_value
    synonyms: [aov, avg order value, average order value]
    definition: "Average order value in USD."
    formula: "AVG(AVG_ORDER_VALUE)"
    unit: USD
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [AVG_ORDER_VALUE]
    notes: "Pre-aggregated AVG(order_total) per day/truck/location grain."
    approved_by: ""
    approved_date: ""

  - name: gross_profit_margin
    synonyms: [margin, gp margin, profit margin, gross margin]
    definition: "Gross profit margin as a ratio (multiply by 100 for percentage)."
    formula: "SUM(TOTAL_GROSS_PROFIT) / NULLIF(SUM(TOTAL_REVENUE), 0)"
    unit: ratio
    grain: "daily / truck / location"
    source_table: LARSR_DB.PROD_TASTY_BYTES.FCT_DAILY_SALES
    source_columns: [TOTAL_GROSS_PROFIT, TOTAL_REVENUE]
    notes: "Derived metric. Divide by total_revenue with null-safe division."
    approved_by: ""
    approved_date: ""

